name: HEAL_isaacsim_full_m6_BEVFusion_anchor_based
root_dir: "dataset/IsaacSimOPV2V/train"
validate_dir: "dataset/IsaacSimOPV2V/validate"
test_dir: "dataset/IsaacSimOPV2V/test"

yaml_parser: "load_general_params"
train_params:
  batch_size: &batch_size 2
  epoches: 50
  eval_freq: 4
  save_freq: 4
  max_cav: 2

comm_range: 50
input_source: ['lidar', 'camera', 'depth']
label_type: 'lidar'
cav_lidar_range: &cav_lidar [0.0, -11.2, -1, 22.4, 11.2, 3]
add_data_extension: []

heter:
  assignment_path: "dataset/IsaacSimOPV2V/heter_modality_assign.json"
  ego_modality: &ego_modality "m1"
  mapping_dict:
    m1: m1
    m2: m1
  modality_setting:
    m1:
      sensor_type: &sensor_type_m1 'multimodal'
      core_method: &core_method_m1 "bevfusion"
      preprocess:
        core_method: 'SpVoxelPreprocessor'
        args:
          voxel_size: &voxel_size [0.1, 0.1, 4]
          max_points_per_voxel: 32
          max_voxel_train: 60000
          max_voxel_test: 120000
        cav_lidar_range: *cav_lidar
      grid_conf: &grid_conf_m1
        xbound: [0.0, 22.4, 0.1]
        ybound: [-11.2, 11.2, 0.1]
        zbound: [-1, 3, 4.0]
        ddiscr: [0.5, 22.4, 64]
        mode: 'LID'
      data_aug_conf: &data_aug_conf_m1
        resize_lim: [0.65, 0.65]
        final_dim: [512, 832]
        rot_lim: [-3.6, 3.6]
        H: 800
        W: 1280
        rand_flip: False
        bot_pct_lim: [0.0, 0.02]
        cams: ['camera0']
        Ncams: 1

fusion:
  core_method: 'lateheter'
  dataset: 'isaacsim'
  args:
    proj_first: false
    grid_conf: *grid_conf_m1
    data_aug_conf: *data_aug_conf_m1

data_augment:
  - NAME: random_world_flip
    ALONG_AXIS_LIST: ['x']
  - NAME: random_world_rotation
    WORLD_ROT_ANGLE: [-0.39269908, 0.39269908]
  - NAME: random_world_scaling
    WORLD_SCALE_RANGE: [0.95, 1.05]

preprocess:
  core_method: 'SpVoxelPreprocessor'
  args:
    voxel_size: [0.1, 0.1, 4]
    max_points_per_voxel: 1
    max_voxel_train: 1
    max_voxel_test: 1
  cav_lidar_range: *cav_lidar

postprocess:
  core_method: 'VoxelPostprocessor'
  gt_range: *cav_lidar
  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 0.53
    w: 0.47
    h: 0.67
    r: &anchor_yaw [0, 90]
    feature_stride: 2
    num: &anchor_num 2
  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.2
  order: 'hwl'
  max_num: 1024
  nms_thresh: 0.15
  dir_args: &dir_args
    dir_offset: 0.7853
    num_bins: 2
    anchor_yaw: *anchor_yaw

model:
  core_method: heter_model_late
  args:
    ego_modality: *ego_modality
    lidar_range: *cav_lidar
    head_type: anchor_based
    m1:
      core_method: *core_method_m1
      sensor_type: *sensor_type_m1
      encoder_args:
        depth_supervision: true
        lidar_encoder:
          core_method: point_pillar
          out_channels: 64
          encoder_args:
            voxel_size: *voxel_size
            lidar_range: *cav_lidar
            pillar_vfe:
              use_norm: true
              with_distance: false
              use_absolute_xyz: true
              num_filters: [64]
            point_pillar_scatter:
              num_features: 64
        camera_encoder:
          core_method: lift_splat_shoot
          out_channels: 64
          encoder_args:
            anchor_number: *anchor_num
            grid_conf: *grid_conf_m1
            data_aug_conf: *data_aug_conf_m1
            img_downsample: 8
            img_features: &img_feature 64
            use_depth_gt: false
            depth_supervision: true
            camera_encoder: EfficientNet
        fuser:
          in_channels: [64, 64]
          out_channels: 64

      backbone_args:
        layer_nums: [3]
        layer_strides: [2]
        num_filters: [64]
      aligner_args:
        core_method: identity
      layers_args:
        layer_nums: [3, 5, 8]
        layer_strides: [2, 2, 2]
        num_filters: [64, 128, 256]
        upsample_strides: [1, 2, 4]
        num_upsample_filter: [128, 128, 128]
      shrink_header:
        kernal_size: [3]
        stride: [1]
        padding: [1]
        dim: [256]
        input_dim: 384
      head_args:
        in_head: 256
    anchor_number: *anchor_num
    dir_args: *dir_args

loss:
  core_method: point_pillar_depth_loss
  args:
    pos_cls_weight: 2.0
    cls:
      type: 'SigmoidFocalLoss'
      alpha: 0.25
      gamma: 2.0
      weight: 1.0
    reg:
      type: 'WeightedSmoothL1Loss'
      sigma: 3.0
      codewise: true
      weight: 2.0
    dir:
      type: 'WeightedSoftmaxClassificationLoss'
      weight: 0.2
      args: *dir_args
    depth:
      weight: 1.0

optimizer:
  core_method: AdamW
  lr: 0.001
  args:
    eps: 1e-8
    weight_decay: 0.01

lr_scheduler:
  core_method: multistep
  gamma: 0.1
  step_size: [10, 25]
