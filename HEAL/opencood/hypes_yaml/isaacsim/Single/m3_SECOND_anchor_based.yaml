name: HEAL_isaacsim_full_m3_SECOND_anchor_based
root_dir: "dataset/IsaacSimOPV2V/train"
validate_dir: "dataset/IsaacSimOPV2V/validate"
test_dir: "dataset/IsaacSimOPV2V/test"

yaml_parser: "load_general_params"
train_params:
  batch_size: &batch_size 4
  epoches: 50
  eval_freq: 4
  save_freq: 4
  max_cav: 2

comm_range: 50
input_source: ['lidar']
label_type: 'lidar'
cav_lidar_range: &cav_lidar [0.0, -11.2, -1, 22.4, 11.2, 3]
add_data_extension: []

heter:
  assignment_path: "dataset/IsaacSimOPV2V/heter_modality_assign.json"
  ego_modality: &ego_modality "m3"
  mapping_dict:
    m1: m3
    m2: m3
  modality_setting:
    m3:
      sensor_type: &sensor_type_m3 'lidar'
      core_method: &core_method_m3 "second"
      preprocess:
        core_method: 'SpVoxelPreprocessor'
        args:
          voxel_size: &voxel_size_m3 [0.1, 0.1, 0.1]
          max_points_per_voxel: 5
          max_voxel_train: 60000
          max_voxel_test: 120000
        cav_lidar_range: *cav_lidar

fusion:
  core_method: 'lateheter'
  dataset: 'isaacsim'
  args:
    proj_first: false
    grid_conf: None
    data_aug_conf: None

data_augment:
  - NAME: random_world_flip
    ALONG_AXIS_LIST: ['x']
  - NAME: random_world_rotation
    WORLD_ROT_ANGLE: [-0.39269908, 0.39269908]
  - NAME: random_world_scaling
    WORLD_SCALE_RANGE: [0.95, 1.05]

preprocess:
  core_method: 'SpVoxelPreprocessor'
  args:
    voxel_size: [0.1, 0.1, 4]
    max_points_per_voxel: 1
    max_voxel_train: 1
    max_voxel_test: 1
  cav_lidar_range: *cav_lidar

postprocess:
  core_method: 'VoxelPostprocessor'
  gt_range: *cav_lidar
  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 0.53
    w: 0.47
    h: 0.67
    r: &anchor_yaw [0, 90]
    feature_stride: 8
    num: &anchor_num 2
  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.2
  order: 'hwl'
  max_num: 1024
  nms_thresh: 0.15
  dir_args: &dir_args
    dir_offset: 0.7853
    num_bins: 2
    anchor_yaw: *anchor_yaw

model:
  core_method: heter_model_late
  args:
    ego_modality: *ego_modality
    lidar_range: *cav_lidar
    m3:
      core_method: *core_method_m3
      sensor_type: *sensor_type_m3
      encoder_args:
        voxel_size: *voxel_size_m3
        lidar_range: *cav_lidar
        mean_vfe:
          num_point_features: 4
        spconv:
          num_features_in: 4
          num_features_out: 64
        map2bev:
          feature_num: 128
      backbone_args:
        layer_nums: [3]
        layer_strides: [1]
        num_filters: [64]
        inplanes: 128
      aligner_args:
        core_method: identity
      layers_args:
        layer_nums: [3, 5, 8]
        layer_strides: [1, 2, 2]
        num_filters: [64, 128, 256]
        upsample_strides: [1, 2, 4]
        num_upsample_filter: [128, 128, 128]
      shrink_header:
        kernal_size: [3]
        stride: [1]
        padding: [1]
        dim: [256]
        input_dim: 384
      head_args:
        in_head: 256
    anchor_number: *anchor_num
    dir_args: *dir_args

loss:
  core_method: point_pillar_depth_loss
  args:
    pos_cls_weight: 2.0
    cls:
      type: 'SigmoidFocalLoss'
      alpha: 0.25
      gamma: 2.0
      weight: 1.0
    reg:
      type: 'WeightedSmoothL1Loss'
      sigma: 3.0
      codewise: true
      weight: 2.0
    dir:
      type: 'WeightedSoftmaxClassificationLoss'
      weight: 0.2
      args: *dir_args
    depth:
      weight: 1.0

optimizer:
  core_method: AdamW
  lr: 0.001
  args:
    eps: 1e-8
    weight_decay: 0.01

lr_scheduler:
  core_method: multistep
  gamma: 0.1
  step_size: [10, 25]
